services:
  # 1. THE DATABASE (Pulls from Docker Hub)
  smartrent-db:
    image: mysql:8.0
    container_name: smartrent-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: smart_rent_db
      MYSQL_ROOT_PASSWORD: Chukwunyerem457
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # 2. THE APP (Builds your custom Java code)
  smartrent-app:
    build: .
    container_name: smartrent-backend
    ports:
      - "8081:8080"
    depends_on:
      smartrent-db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://smartrent-db:3306/smart_rent_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Chukwunyerem457
      - JWT_SECRET=${JWT_SECRET}
      - paystack.secret.key=sk_test_8095e8a44dd53502e8949bc4df73a40c7b09ccdd








